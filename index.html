<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #app { width: 100vw; height: 100vh; background: url('neuro.png') center/cover no-repeat; position: relative; }
        
        /* Formulario */
        #login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { text-align: center; color: #d4af37; border: 1px solid #d4af37; padding: 40px; background: #050508; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; background: #d4af37; border: none; }

        /* Nodos */
        .nodo { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: rgba(212, 175, 55, 0.2); border: 2px solid #d4af37; color: #d4af37; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.7em; cursor: pointer; transition: 0.3s; z-index: 10; }
        .nodo:hover { transform: scale(1.2); box-shadow: 0 0 20px #d4af37; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-overlay">
        <div class="login-box">
            <h3>Identificación Clínica</h3>
            <input type="text" id="nombre-input" placeholder="APELLIDO Nombre">
            <button onclick="registrarIngreso()">INGRESAR</button>
        </div>
    </div>
    <div id="mapa"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD47_2UtWLFI_VRVvvXVAqn4zZzZ4d1ggo", projectId: "av-clinica-convergencia", authDomain: "av-clinica-convergencia.firebaseapp.com", databaseURL: "https://av-clinica-convergencia-default-rtdb.firebaseio.com", storageBucket: "av-clinica-convergencia.firebasestorage.app", messagingSenderId: "939404425675", appId: "1:939404425675:web:8cfae157099efabd741e4e" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const estaciones = [
        { id: 1, x: 15, y: 50, nombre: "Cartografía de la Intesubjetividad" },
        { id: 2, x: 25, y: 30, nombre: "Memorias traumáticas" },
        { id: 3, x: 35, y: 20, nombre: "Circuitos de recompensa" },
        { id: 4, x: 45, y: 25, nombre: "Interfaz mente cuerpo" },
        { id: 5, x: 55, y: 40, nombre: "Neurobiología de la repetición" },
        { id: 6, x: 65, y: 30, nombre: "Plasticidad simbólica y sináptica" },
        { id: 7, x: 75, y: 45, nombre: "Arquitectura del sueño" },
        { id: 8, x: 65, y: 60, nombre: "El Ello somático" },
        { id: 9, x: 50, y: 70, nombre: "Estructuras límbicas" },
        { id: 10, x: 35, y: 80, nombre: "Etica de la singularidad" }
    ];

    async function registrarIngreso() {
        const nombre = document.getElementById('nombre-input').value;
        if (!nombre) return;
        
        try {
            await db.collection("ingresos").add({
                nombre: nombre,
                fecha: new Date().toISOString()
            });
            alert("Ingreso exitoso");
            document.getElementById('login-overlay').style.display = 'none';
        } catch (e) {
            console.error(e);
        }
    }

    const mapa = document.getElementById('mapa');
    estaciones.forEach(est => {
        const div = document.createElement('div');
        div.className = 'nodo';
        div.style.left = est.x + '%';
        div.style.top = est.y + '%';
        div.innerHTML = est.nombre;
        div.onclick = () => {
            if (est.id === 1) window.location.href = "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/";
        };
        mapa.appendChild(div);
    });
</script>
</body>
</html>
