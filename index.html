<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartografía | Clínica de la Convergencia</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #app { width: 100vw; height: 100vh; background: url('neuro.png') center/cover no-repeat; position: relative; }
        .nodo { position: absolute; width: 90px; height: 90px; border-radius: 50%; border: 2px solid #d4af37; background: rgba(0,0,0,0.8); color: #d4af37; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 0.6em; cursor: pointer; transition: 0.3s; z-index: 10; }
        .nodo:hover { transform: scale(1.1); box-shadow: 0 0 15px #d4af37; }
    </style>
</head>
<body>
<div id="app">
    <div id="mapa"></div>
</div>
<script>
    const estaciones = [
        { id: 1, x: 20, y: 50, nombre: "Cartografía de la Intersubjetividad" },
        { id: 2, x: 30, y: 30, nombre: "Memorias traumáticas" },
        { id: 3, x: 45, y: 20, nombre: "Circuitos de recompensa" },
        { id: 4, x: 60, y: 25, nombre: "Interfaz mente cuerpo" },
        { id: 5, x: 75, y: 40, nombre: "Neurobiología de la repetición" },
        { id: 6, x: 70, y: 60, nombre: "Plasticidad simbólica" },
        { id: 7, x: 55, y: 75, nombre: "Arquitectura del sueño" },
        { id: 8, x: 40, y: 70, nombre: "El Ello somático" },
        { id: 9, x: 50, y: 50, nombre: "Estructuras límbicas" },
        { id: 10, x: 50, y: 90, nombre: "Etica de la singularidad" }
    ];

    const mapa = document.getElementById('mapa');
    estaciones.forEach(est => {
        const div = document.createElement('div');
        div.className = 'nodo';
        div.style.left = est.x + '%';
        div.style.top = est.y + '%';
        div.innerHTML = est.nombre;
        div.onclick = () => {
            window.location.href = est.id === 1 ? "https://drrubenmpereyra-stack.github.io/estacion-1-evaluacion-clinica/" : `encuentro.html?id=${est.id}`;
        };
        mapa.appendChild(div);
    });
</script>
</body>
</html>
